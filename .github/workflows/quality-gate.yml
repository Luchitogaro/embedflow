name: Quality Gate

on:
  pull_request:
  push:
    branches: [master]

jobs:
  web-quality:
    name: Web quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      WORKER_URL: http://127.0.0.1:8000
      WORKER_SHARED_SECRET: ci-worker-secret
      SHARE_LINK_TTL_DAYS: "30"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Public WCAG AA audit
        run: |
          npm run start -- --port 3000 > /tmp/next-start.log 2>&1 &
          NEXT_PID=$!
          trap "kill $NEXT_PID" EXIT
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 1
          done
          npm run a11y:audit

  worker-quality:
    name: Worker quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax checks
        run: python -m py_compile main.py routers/jobs.py services/db.py services/extractor.py
